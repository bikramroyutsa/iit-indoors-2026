<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="740" viewBox="0 0 210 148" shape-rendering="crispEdges">
  <defs>
    <!-- Dither Patterns -->
    <pattern id="dither1" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#004650" />
      <rect x="1" y="0" width="1" height="1" fill="#00556c" />
      <rect x="0" y="1" width="1" height="1" fill="#00556c" />
      <rect x="2" y="1" width="1" height="1" fill="#00556c" />
      <rect x="1" y="2" width="1" height="1" fill="#00556c" />
      <rect x="3" y="2" width="1" height="1" fill="#00556c" />
      <rect x="0" y="3" width="4" height="1" fill="#00556c" />
      <rect x="0" y="3" width="1" height="1" fill="#004650" />
    </pattern>
    <pattern id="dither2" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#00556c" />
      <rect x="1" y="0" width="1" height="1" fill="#006488" />
      <rect x="0" y="1" width="1" height="1" fill="#006488" />
      <rect x="2" y="1" width="1" height="1" fill="#006488" />
      <rect x="1" y="2" width="1" height="1" fill="#006488" />
      <rect x="3" y="2" width="1" height="1" fill="#006488" />
      <rect x="0" y="3" width="4" height="1" fill="#006488" />
      <rect x="0" y="3" width="1" height="1" fill="#00556c" />
    </pattern>
    <pattern id="dither3" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#006488" />
      <rect x="1" y="0" width="1" height="1" fill="#0073a3" />
      <rect x="0" y="1" width="1" height="1" fill="#0073a3" />
      <rect x="2" y="1" width="1" height="1" fill="#0073a3" />
      <rect x="1" y="2" width="1" height="1" fill="#0073a3" />
      <rect x="3" y="2" width="1" height="1" fill="#0073a3" />
      <rect x="0" y="3" width="4" height="1" fill="#0073a3" />
      <rect x="0" y="3" width="1" height="1" fill="#006488" />
    </pattern>
    <pattern id="dither4" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#0073a3" />
      <rect x="1" y="0" width="1" height="1" fill="#0083bf" />
      <rect x="0" y="1" width="1" height="1" fill="#0083bf" />
      <rect x="2" y="1" width="1" height="1" fill="#0083bf" />
      <rect x="1" y="2" width="1" height="1" fill="#0083bf" />
      <rect x="3" y="2" width="1" height="1" fill="#0083bf" />
      <rect x="0" y="3" width="4" height="1" fill="#0083bf" />
      <rect x="0" y="3" width="1" height="1" fill="#0073a3" />
    </pattern>
    <!-- Warning Pattern for Shutters -->
    <pattern id="warning_stripes" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="5" height="10" fill="#1a1a1a" />
      <rect x="5" width="5" height="10" fill="#333333" />
    </pattern>
  </defs>

  <!-- BACKGROUND SKY -->
  <g>
    <rect width="210" height="29.6" y="0" fill="#004650" />
    <rect width="210" height="29.6" y="29.6" fill="#00556c" />
    <rect width="210" height="29.6" y="59.2" fill="#006488" />
    <rect width="210" height="29.6" y="88.8" fill="#0073a3" />
    <rect width="210" height="29.6" y="118.4" fill="#0083bf" />

    <rect width="210" height="4" y="27.6" fill="url(#dither1)" />
    <rect width="210" height="4" y="57.2" fill="url(#dither2)" />
    <rect width="210" height="4" y="86.8" fill="url(#dither3)" />
    <rect width="210" height="4" y="116.4" fill="url(#dither4)" />

    <g transform="translate(30, 20) scale(0.5)" opacity="0.4">
      <rect x="8" y="2" width="12" height="2" fill="#ffffff" />
      <rect x="4" y="4" width="20" height="2" fill="#ffffff" />
      <rect x="2" y="6" width="26" height="4" fill="#ffffff" />
    </g>
    <g transform="translate(140, 50) scale(0.4)" opacity="0.7">
      <rect x="10" y="2" width="6" height="2" fill="#ffffff" />
      <rect x="6" y="4" width="14" height="2" fill="#ffffff" />
      <rect x="4" y="6" width="18" height="2" fill="#ffffff" />
      <rect x="2" y="8" width="20" height="4" fill="#ffffff" />
    </g>
  </g>

  <!-- SHUTTERS / WINDOWS CLOSING -->
  <rect x="0" y="0" width="60" height="148" fill="#0a0a0a" />
  <rect x="58" y="0" width="2" height="148" fill="#333" />
  <rect x="55" y="0" width="3" height="148" fill="url(#warning_stripes)" opacity="0.3" />
  
  <rect x="150" y="0" width="60" height="148" fill="#0a0a0a" />
  <rect x="150" y="0" width="2" height="148" fill="#333" />
  <rect x="152" y="0" width="3" height="148" fill="url(#warning_stripes)" opacity="0.3" />

  <rect x="0" y="0" width="210" height="20" fill="#050505" />
  <rect x="0" y="18" width="210" height="2" fill="#222" />

  <rect x="0" y="128" width="210" height="20" fill="#050505" />
  <rect x="0" y="128" width="210" height="2" fill="#222" />

  <rect x="104" y="20" width="2" height="108" fill="#111" />
  <rect x="103" y="20" width="1" height="108" fill="#222" />
  <rect x="106" y="20" width="1" height="108" fill="#222" />
</svg>
