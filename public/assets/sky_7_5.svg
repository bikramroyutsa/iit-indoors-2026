<svg xmlns="http://www.w3.org/2000/svg" width="700" height="500" viewBox="0 0 700 500" shape-rendering="crispEdges">
  <!-- Sky Bands -->
  <rect width="700" height="100" y="0" fill="#004650" />
  <rect width="700" height="100" y="100" fill="#00556C" />
  <rect width="700" height="100" y="200" fill="#006488" />
  <rect width="700" height="100" y="300" fill="#0073A3" />
  <rect width="700" height="100" y="400" fill="#0083BF" />

  <!-- Dither Patterns -->
  <defs>
    <pattern id="dither1" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" x="4" y="0" fill="#00556C" />
      <rect width="4" height="4" x="0" y="4" fill="#00556C" />
      <rect width="4" height="4" x="8" y="4" fill="#00556C" />
      <rect width="4" height="4" x="4" y="8" fill="#00556C" />
      <rect width="4" height="4" x="12" y="8" fill="#00556C" />
      <rect width="16" height="4" x="0" y="12" fill="#00556C" />
      <rect width="4" height="4" x="0" y="12" fill="#004650" />
    </pattern>
    <pattern id="dither2" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" x="4" y="0" fill="#006488" />
      <rect width="4" height="4" x="0" y="4" fill="#006488" />
      <rect width="4" height="4" x="8" y="4" fill="#006488" />
      <rect width="4" height="4" x="4" y="8" fill="#006488" />
      <rect width="4" height="4" x="12" y="8" fill="#006488" />
      <rect width="16" height="4" x="0" y="12" fill="#006488" />
      <rect width="4" height="4" x="0" y="12" fill="#00556C" />
    </pattern>
    <pattern id="dither3" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" x="4" y="0" fill="#0073A3" />
      <rect width="4" height="4" x="0" y="4" fill="#0073A3" />
      <rect width="4" height="4" x="8" y="4" fill="#0073A3" />
      <rect width="4" height="4" x="4" y="8" fill="#0073A3" />
      <rect width="4" height="4" x="12" y="8" fill="#0073A3" />
      <rect width="16" height="4" x="0" y="12" fill="#0073A3" />
      <rect width="4" height="4" x="0" y="12" fill="#006488" />
    </pattern>
    <pattern id="dither4" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" x="4" y="0" fill="#0083BF" />
      <rect width="4" height="4" x="0" y="4" fill="#0083BF" />
      <rect width="4" height="4" x="8" y="4" fill="#0083BF" />
      <rect width="4" height="4" x="4" y="8" fill="#0083BF" />
      <rect width="4" height="4" x="12" y="8" fill="#0083BF" />
      <rect width="16" height="4" x="0" y="12" fill="#0083BF" />
      <rect width="4" height="4" x="0" y="12" fill="#0073A3" />
    </pattern>
  </defs>

  <rect width="700" height="16" y="92" fill="url(#dither1)" />
  <rect width="700" height="16" y="192" fill="url(#dither2)" />
  <rect width="700" height="16" y="292" fill="url(#dither3)" />
  <rect width="700" height="16" y="392" fill="url(#dither4)" />

  <!-- Clouds -->
  <!-- Cloud 1 at 15% depth -->
  <g transform="translate(100, 70) scale(4)" opacity="0.4">
    <rect x="8" y="2" width="12" height="2" fill="#ffffff" />
    <rect x="4" y="4" width="20" height="2" fill="#ffffff" />
    <rect x="2" y="6" width="26" height="4" fill="#ffffff" />
  </g>

  <!-- Cloud 2 at 35% depth -->
  <g transform="translate(450, 160) scale(3)" opacity="0.7">
    <rect x="10" y="2" width="6" height="2" fill="#ffffff" />
    <rect x="6" y="4" width="14" height="2" fill="#ffffff" />
    <rect x="4" y="6" width="18" height="2" fill="#ffffff" />
    <rect x="2" y="8" width="20" height="4" fill="#ffffff" />
  </g>

  <!-- Cloud 1 at 65% depth -->
  <g transform="translate(200, 320) scale(3.5)" opacity="0.6">
    <rect x="8" y="2" width="12" height="2" fill="#ffffff" />
    <rect x="4" y="4" width="20" height="2" fill="#ffffff" />
    <rect x="2" y="6" width="26" height="4" fill="#ffffff" />
  </g>

  <!-- Cloud 2 at 85% depth -->
  <g transform="translate(500, 420) scale(2.5)" opacity="0.3">
    <rect x="10" y="2" width="6" height="2" fill="#ffffff" />
    <rect x="6" y="4" width="14" height="2" fill="#ffffff" />
    <rect x="4" y="6" width="18" height="2" fill="#ffffff" />
    <rect x="2" y="8" width="20" height="4" fill="#ffffff" />
  </g>
</svg>
