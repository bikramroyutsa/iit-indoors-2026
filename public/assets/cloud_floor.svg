<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" shape-rendering="crispEdges">
  <!-- Main Cloud Body (Plateau) -->
  <rect x="100" y="200" width="600" height="150" fill="#ffffff" />
  
  <!-- Left Rounded Edge -->
  <rect x="60" y="220" width="40" height="110" fill="#ffffff" />
  <rect x="40" y="240" width="20" height="70" fill="#ffffff" />
  
  <!-- Right Rounded Edge -->
  <rect x="700" y="220" width="40" height="110" fill="#ffffff" />
  <rect x="740" y="240" width="20" height="70" fill="#ffffff" />
  
  <!-- Fluffy Top Mounds -->
  <rect x="150" y="170" width="100" height="30" fill="#ffffff" />
  <rect x="170" y="150" width="60" height="20" fill="#ffffff" />
  
  <rect x="350" y="160" width="120" height="40" fill="#ffffff" />
  <rect x="370" y="140" width="80" height="20" fill="#ffffff" />
  
  <rect x="550" y="180" width="80" height="20" fill="#ffffff" />
  
  <!-- "Floor" Texture / Grid (Very subtle light blue/gray) -->
  <g opacity="0.1">
    <rect x="100" y="200" width="600" height="2" fill="#000000" />
    <rect x="100" y="240" width="600" height="2" fill="#000000" />
    <rect x="100" y="280" width="600" height="2" fill="#000000" />
    <rect x="100" y="320" width="600" height="2" fill="#000000" />
    
    <rect x="200" y="200" width="2" height="150" fill="#000000" />
    <rect x="300" y="200" width="2" height="150" fill="#000000" />
    <rect x="400" y="200" width="2" height="150" fill="#000000" />
    <rect x="500" y="200" width="2" height="150" fill="#000000" />
    <rect x="600" y="200" width="2" height="150" fill="#000000" />
  </g>

  <!-- Bottom Dither (Shading) -->
  <rect x="100" y="350" width="600" height="10" fill="#e0e0e0" />
  <rect x="150" y="360" width="500" height="10" fill="#d0d0d0" />
  <rect x="250" y="370" width="300" height="10" fill="#c0c0c0" />

  <!-- Sparkling Particles (Dream effect) -->
  <rect x="120" y="140" width="4" height="4" fill="#16DBAB" opacity="0.6" />
  <rect x="320" y="100" width="4" height="4" fill="#66F5CF" opacity="0.8" />
  <rect x="680" y="160" width="4" height="4" fill="#16DBAB" opacity="0.5" />
  <rect x="420" y="110" width="6" height="6" fill="#ffffff" opacity="0.9" />
  <rect x="200" y="80" width="2" height="2" fill="#ffffff" />
</svg>
