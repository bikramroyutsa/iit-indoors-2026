<svg xmlns="http://www.w3.org/2000/svg" width="210mm" height="148mm" viewBox="0 0 210 148" shape-rendering="crispEdges">
  <defs>
    <!-- Paper Texture Pattern (Dots) -->
    <pattern id="paper-texture" width="2" height="2" patternUnits="userSpaceOnUse">
      <circle cx="0.5" cy="0.5" r="0.2" fill="#000000" opacity="0.02" />
    </pattern>
    
    <!-- Paper Lines Pattern -->
    <pattern id="paper-lines" width="100%" height="1.5" patternUnits="userSpaceOnUse">
      <rect width="100%" height="0.5" fill="#000000" opacity="0.03" />
    </pattern>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="0" y="0" width="200%" height="200%">
      <feOffset dx="4" dy="4" in="SourceAlpha" result="offset" />
      <feFlood flood-color="black" flood-opacity="0.8" result="flood" />
      <feComposite in="flood" in2="offset" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Shadow (Simple rect for crispness) -->
  <rect x="5" y="5" width="200" height="138" fill="black" opacity="0.8" />
  
  <!-- Main Paper Surface -->
  <rect x="2" y="2" width="200" height="138" fill="#f4f1ea" stroke="black" stroke-width="0.8" />
  
  <!-- Texture Overlays -->
  <rect x="2" y="2" width="200" height="138" fill="url(#paper-texture)" pointer-events="none" />
  <rect x="2" y="2" width="200" height="138" fill="url(#paper-lines)" pointer-events="none" />

  <!-- Subtle Corner Accents (Like a physical board) -->
  <g opacity="0.1" stroke="black" stroke-width="0.2">
    <line x1="2" y1="12" x2="12" y2="2" />
    <line x1="192" y1="2" x2="202" y2="12" />
    <line x1="2" y1="130" x2="12" y2="140" />
    <line x1="192" y1="140" x2="202" y2="130" />
  </g>

  <!-- Paper Edge Wear (Optional, very subtle) -->
  <rect x="2" y="2" width="200" height="1" fill="white" opacity="0.1" />
  <rect x="2" y="2" width="1" height="138" fill="white" opacity="0.1" />
</svg>
