<svg xmlns="http://www.w3.org/2000/svg" width="400" height="1600" viewBox="0 0 40 160" shape-rendering="crispEdges">
  <defs>
    <!-- Paper Texture Pattern (Dots) -->
    <pattern id="paper-texture" width="2" height="2" patternUnits="userSpaceOnUse">
      <circle cx="0.5" cy="0.5" r="0.2" fill="#000000" opacity="0.02" />
    </pattern>
    
    <!-- Paper Lines Pattern -->
    <pattern id="paper-lines" width="100%" height="1.5" patternUnits="userSpaceOnUse">
      <rect width="100%" height="0.5" fill="#000000" opacity="0.03" />
    </pattern>
  </defs>

  <!-- Background Shadow (Crisp Offset) -->
  <rect x="2" y="2" width="37" height="157" fill="black" opacity="0.8" />
  
  <!-- Main Paper Surface -->
  <rect x="0.5" y="0.5" width="37" height="157" fill="#f4f1ea" stroke="black" stroke-width="0.3" />
  
  <!-- Texture Overlays -->
  <rect x="0.5" y="0.5" width="37" height="157" fill="url(#paper-texture)" pointer-events="none" />
  <rect x="0.5" y="0.5" width="37" height="157" fill="url(#paper-lines)" pointer-events="none" />

  <!-- Subtle Paper Edge Accents -->
  <rect x="0.5" y="0.5" width="37" height="0.2" fill="white" opacity="0.1" />
  <rect x="0.5" y="0.5" width="0.2" height="157" fill="white" opacity="0.1" />
</svg>
